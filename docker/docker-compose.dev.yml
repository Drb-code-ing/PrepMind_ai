# docker/docker-compose.dev.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: prepmind
      POSTGRES_USER: prepmind
      POSTGRES_PASSWORD: devpass
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        attempt=0
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          attempt=$$((attempt + 1))
          [ "$$attempt" -ge 30 ] && exit 1
          sleep 1
        done
        mc ready local
        mc mb --ignore-existing local/prepmind-dev
        mc ilm import local/prepmind-dev < /config/operator-audit-export-lifecycle.json
    volumes:
      - ./minio/operator-audit-export-lifecycle.json:/config/operator-audit-export-lifecycle.json:ro

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      SERVER_ROLE: api
      KNOWLEDGE_PROCESSING_MODE: ${KNOWLEDGE_PROCESSING_MODE:-inline}
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-qwen}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-v4}
      RAG_EMBEDDING_BASE_URL: ${RAG_EMBEDDING_BASE_URL:-}
      RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS:-1536}
      RAG_EMBEDDING_BATCH_SIZE: ${RAG_EMBEDDING_BATCH_SIZE:-32}
      QWEN_API_KEY: ${QWEN_API_KEY:-${Qwen_API_KEY:-${DASHSCOPE_API_KEY:-}}}
      RAG_CHUNK_TARGET_TOKENS: ${RAG_CHUNK_TARGET_TOKENS:-650}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-80}
      RAG_CHUNK_MAX_TOKENS: ${RAG_CHUNK_MAX_TOKENS:-900}
      RAG_MAX_CHUNKS_PER_DOCUMENT: ${RAG_MAX_CHUNKS_PER_DOCUMENT:-500}
      EMBEDDING_REQUEST_TIMEOUT_MS: ${EMBEDDING_REQUEST_TIMEOUT_MS:-30000}
      AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-mock}
      AI_ENABLE_LIVE_CALLS: ${AI_ENABLE_LIVE_CALLS:-false}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REVIEW_AGENT_MODEL_ENABLED: ${REVIEW_AGENT_MODEL_ENABLED:-false}
      PLANNER_AGENT_MODEL_ENABLED: ${PLANNER_AGENT_MODEL_ENABLED:-false}
      REVIEW_AGENT_MODEL_TIMEOUT_MS: ${REVIEW_AGENT_MODEL_TIMEOUT_MS:-4500}
      PLANNER_AGENT_MODEL_TIMEOUT_MS: ${PLANNER_AGENT_MODEL_TIMEOUT_MS:-4500}
      CONVERSATION_SUMMARY_MAX_CALLS: ${CONVERSATION_SUMMARY_MAX_CALLS:-1}
      CONVERSATION_SUMMARY_MAX_INPUT_TOKENS: ${CONVERSATION_SUMMARY_MAX_INPUT_TOKENS:-1600}
      CONVERSATION_SUMMARY_MAX_OUTPUT_TOKENS: ${CONVERSATION_SUMMARY_MAX_OUTPUT_TOKENS:-400}
      CONVERSATION_SUMMARY_TIMEOUT_MS: ${CONVERSATION_SUMMARY_TIMEOUT_MS:-8000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3100,http://127.0.0.1:3100}
      OUTBOX_OPS_ENABLED: ${OUTBOX_OPS_ENABLED:-true}
      OPERATOR_AUDIT_ENABLED: ${OPERATOR_AUDIT_ENABLED:-true}
      OPERATOR_AUDIT_EXPORT_ENABLED: ${OPERATOR_AUDIT_EXPORT_ENABLED:-true}
      OPERATOR_AUDIT_FINGERPRINT_SECRET: ${OPERATOR_AUDIT_FINGERPRINT_SECRET:-local-dev-audit-fingerprint-change-me}
      WORKER_READINESS_ENABLED: ${WORKER_READINESS_ENABLED:-true}
      WORKER_OBSERVABILITY_ENABLED: ${WORKER_OBSERVABILITY_ENABLED:-true}
      DATABASE_URL: postgresql://prepmind:devpass@postgres:5432/prepmind
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: prepmind-dev
      PUBLIC_API_BASE_URL: http://localhost:3001

  worker:
    profiles:
      - worker
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      SERVER_ROLE: worker
      KNOWLEDGE_PROCESSING_MODE: queue
      RAG_EMBEDDING_PROVIDER: ${RAG_EMBEDDING_PROVIDER:-qwen}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-text-embedding-v4}
      RAG_EMBEDDING_BASE_URL: ${RAG_EMBEDDING_BASE_URL:-}
      RAG_EMBEDDING_DIMENSIONS: ${RAG_EMBEDDING_DIMENSIONS:-1536}
      RAG_EMBEDDING_BATCH_SIZE: ${RAG_EMBEDDING_BATCH_SIZE:-32}
      QWEN_API_KEY: ${QWEN_API_KEY:-${Qwen_API_KEY:-${DASHSCOPE_API_KEY:-}}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_CHUNK_TARGET_TOKENS: ${RAG_CHUNK_TARGET_TOKENS:-650}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-80}
      RAG_CHUNK_MAX_TOKENS: ${RAG_CHUNK_MAX_TOKENS:-900}
      RAG_MAX_CHUNKS_PER_DOCUMENT: ${RAG_MAX_CHUNKS_PER_DOCUMENT:-500}
      EMBEDDING_REQUEST_TIMEOUT_MS: ${EMBEDDING_REQUEST_TIMEOUT_MS:-30000}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      OUTBOX_DISPATCHER_ENABLED: ${OUTBOX_DISPATCHER_ENABLED:-true}
      OPERATOR_AUDIT_EXPORT_ENABLED: ${OPERATOR_AUDIT_EXPORT_ENABLED:-true}
      OPERATOR_AUDIT_MAINTENANCE_ENABLED: ${OPERATOR_AUDIT_MAINTENANCE_ENABLED:-true}
      OPERATOR_AUDIT_FINGERPRINT_SECRET: ${OPERATOR_AUDIT_FINGERPRINT_SECRET:-local-dev-audit-fingerprint-change-me}
      DATABASE_URL: postgresql://prepmind:devpass@postgres:5432/prepmind
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: prepmind-dev
      PUBLIC_API_BASE_URL: http://server:3001
      WORKER_READINESS_CLI_TIMEOUT_MS: ${WORKER_READINESS_CLI_TIMEOUT_MS:-5000}
    healthcheck:
      test: ["CMD-SHELL", "bun apps/server/dist/scripts/worker-readiness.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    tmpfs:
      - /tmp/prepmind-audit-exports:size=201326592,mode=0700,uid=1001,gid=1001

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:3001}
      NEXT_PUBLIC_ADMIN_CONSOLE_URL: ${NEXT_PUBLIC_ADMIN_CONSOLE_URL:-http://127.0.0.1:3100}
      PREPMIND_INTERNAL_API_BASE_URL: http://server:3001
      PREPMIND_LOCAL_DEV_TOOLS_ENABLED: ${PREPMIND_LOCAL_DEV_TOOLS_ENABLED:-true}
      AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-mock}
      AI_ENABLE_LIVE_CALLS: ${AI_ENABLE_LIVE_CALLS:-false}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
      ROUTER_MODEL_ENABLED: ${ROUTER_MODEL_ENABLED:-false}
      KNOWLEDGE_VERIFIER_MODEL_ENABLED: ${KNOWLEDGE_VERIFIER_MODEL_ENABLED:-false}
      ROUTER_MODEL_TIMEOUT_MS: ${ROUTER_MODEL_TIMEOUT_MS:-5000}
      KNOWLEDGE_VERIFIER_MODEL_TIMEOUT_MS: ${KNOWLEDGE_VERIFIER_MODEL_TIMEOUT_MS:-4000}

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_ADMIN_API_BASE_URL:-http://127.0.0.1:3001}
        PREPMIND_INTERNAL_API_BASE_URL: http://server:3001
    env_file:
      - ../.env
    ports:
      - "3100:3100"
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_ADMIN_API_BASE_URL:-http://127.0.0.1:3001}
      PREPMIND_INTERNAL_API_BASE_URL: http://server:3001

volumes:
  pgdata:
  miniodata:
