# docker/docker-compose.dev.yml

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: prepmind
      POSTGRES_USER: prepmind
      POSTGRES_PASSWORD: devpass
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      SERVER_ROLE: ${SERVER_ROLE:-both}
      KNOWLEDGE_PROCESSING_MODE: ${KNOWLEDGE_PROCESSING_MODE:-inline}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: postgresql://prepmind:devpass@postgres:5432/prepmind
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: prepmind-dev
      PUBLIC_API_BASE_URL: http://localhost:3001

  worker:
    profiles:
      - worker
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      SERVER_ROLE: worker
      KNOWLEDGE_PROCESSING_MODE: queue
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      DATABASE_URL: postgresql://prepmind:devpass@postgres:5432/prepmind
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: prepmind-dev
      PUBLIC_API_BASE_URL: http://server:3001
      WORKER_READINESS_CLI_TIMEOUT_MS: ${WORKER_READINESS_CLI_TIMEOUT_MS:-5000}
    healthcheck:
      test: ["CMD-SHELL", "bun apps/server/dist/scripts/worker-readiness.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
